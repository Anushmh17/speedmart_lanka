name: speedmart_lanka
description: "Speedmart Lanka - Multi-vendor e-commerce marketplace for Sri Lanka."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.4

  # Networking
  dio: ^5.6.0
  connectivity_plus: ^6.1.4

  # Local storage
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # UI
  google_fonts: ^8.1.0
  uuid: ^4.5.3
  flutter_svg: ^2.0.10

  # Image picking (camera + gallery)
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  image_cropper: ^9.0.0

  # GPS & Map integration
  geolocator: ^12.0.0
  flutter_map: ^7.0.1
  latlong2: ^0.9.0
  url_launcher: ^6.3.2

  # Local notifications
  flutter_local_notifications: ^17.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/banks/
    - assets/images/figma/sri_lanka_customer_login/
    - assets/images/figma/new_password_update_sri_lanka_vendor/
    - assets/images/figma/sri_lanka_customer_login_otp/
    - assets/images/figma/sri_lanka_customer_register/
    - assets/images/figma/sri_lanka_customer_register_otp/
    - assets/images/figma/sri_lanka_vendor_forget_password/
    - assets/images/figma/sri_lanka_vendor_forget_password_otp/
    - assets/images/figma/sri_lanka_vendor_login/
    - assets/images/figma/sri_lanka_vendor_login_otp/
    - assets/images/figma/sri_lanka_vendor_register/
    - assets/images/figma/sri_lanka_vendor_register_otp/

  